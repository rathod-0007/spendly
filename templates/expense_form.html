{% extends "base.html" %}

{% block title %}{{ title }} — Spendly{% endblock %}

{% block content %}
<section class="auth-section" style="min-height: calc(100vh - 60px - 100px); padding: 2rem 1rem;">
    <div class="auth-container" style="max-width: 480px;">

        <div class="auth-header" style="margin-bottom: 1.5rem;">
            <span class="hero-badge" style="margin-bottom: 0.5rem;">Transactions</span>
            <h1 class="auth-title" style="font-size: 2rem;">{{ title }}</h1>
            <p class="auth-subtitle">Keep your records up to date</p>
        </div>

        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <!-- Amount -->
                <div class="form-group">
                    <label for="amount">Amount (INR, ₹)</label>
                    <input type="number" step="0.01" min="0.01" id="amount" name="amount"
                           class="form-input" placeholder="0.00"
                           value="{{ expense['amount'] if expense else '' }}"
                           required autofocus>
                </div>

                <!-- Category -->
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" style="appearance: none; background-color: var(--paper);" required>
                        <option value="" disabled {{ 'selected' if not expense else '' }}>Select a category</option>
                        {% set categories = ['Bills', 'Food', 'Health', 'Transport', 'Entertainment', 'Shopping', 'Other'] %}
                        {% for cat in categories %}
                            <option value="{{ cat }}" {{ 'selected' if expense and expense['category'] == cat else '' }}>
                                {{ cat }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Date -->
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ expense['date'] if expense else today }}"
                           required>
                </div>

                <!-- Description -->
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description"
                           class="form-input" placeholder="What was this for?"
                           value="{{ expense['description'] if expense else '' }}">
                </div>

                <!-- Submit & Cancel Buttons -->
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="submit" class="btn-submit" style="margin-top: 0; flex: 1;">Save Expense</button>
                    <a href="{{ url_for('dashboard') }}" class="btn-ghost" style="flex: 1; text-align: center; line-height: 2.2rem; padding: 0;">Cancel</a>
                </div>
            </form>
        </div>

    </div>
</section>
{% endblock %}
